name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # 1. Shell script linting (shellcheck)
  # ---------------------------------------------------------------------------
  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Lint installer scripts
        run: |
          shellcheck -S warning \
            install/install.sh \
            install/preflight.sh \
            install/uninstall.sh \
            install/lib/common.sh \
            install/lib/detect.sh \
            install/lib/packages.sh \
            install/lib/apptainer.sh \
            install/lib/nvidia.sh \
            install/lib/selinux.sh

      - name: Lint deploy scripts
        run: |
          shellcheck -S warning \
            deploy/slurm/ai_flux_worker.slurm \
            deploy/ood/script.sh.erb \
            tests/integration/smoke_test.sh

  # ---------------------------------------------------------------------------
  # 2. Python unit tests
  # ---------------------------------------------------------------------------
  python-tests:
    name: Python Unit Tests
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: tests/requirements.txt

      - name: Install test dependencies
        run: pip install -r tests/requirements.txt

      - name: Syntax check vllm_watcher.py
        run: python -m py_compile src/vllm_watcher.py

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results-py${{ matrix.python-version }}
          path: |
            .pytest_cache/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # 3. Installer dry-run (validates logic without making system changes)
  # ---------------------------------------------------------------------------
  installer-dry-run:
    name: Installer Dry-run
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Make scripts executable
        run: chmod +x install/install.sh install/preflight.sh install/uninstall.sh

      - name: Dry-run head node install
        run: |
          sudo STROMA_DRY_RUN=1 STROMA_YES=1 \
            STROMA_HEAD_HOST=ci-test.example \
            STROMA_API_KEY=ci-test-key-$(openssl rand -hex 16) \
            bash install/install.sh --mode=head --dry-run --yes

      - name: Dry-run worker install
        run: |
          sudo STROMA_DRY_RUN=1 STROMA_YES=1 \
            bash install/install.sh --mode=worker --dry-run --yes

  # ---------------------------------------------------------------------------
  # 4. Container definition syntax check
  # ---------------------------------------------------------------------------
  apptainer-def-lint:
    name: Apptainer .def Syntax
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Apptainer
        run: |
          sudo apt-get install -y wget
          APPTAINER_VER="1.3.6"
          wget -q "https://github.com/apptainer/apptainer/releases/download/v${APPTAINER_VER}/apptainer_${APPTAINER_VER}_amd64.deb"
          sudo apt-get install -y ./apptainer_${APPTAINER_VER}_amd64.deb

      - name: Validate .def file syntax (parse only, no build)
        run: |
          # apptainer build --dry-run parses the .def without pulling the base image
          # We check only that the syntax is valid
          python3 -c "
          import re, sys
          text = open('deploy/containers/ai-flux-vllm.def').read()
          sections = re.findall(r'^%\w+', text, re.MULTILINE)
          required = ['%post', '%environment', '%runscript']
          missing = [s for s in required if s not in sections]
          if missing:
              print(f'Missing required sections: {missing}', file=sys.stderr)
              sys.exit(1)
          print(f'Sections found: {sections}')
          print('.def syntax check passed')
          "

  # ---------------------------------------------------------------------------
  # 5. Config file completeness check
  # ---------------------------------------------------------------------------
  config-check:
    name: Config Completeness
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Check config.example.env documents all STROMA_* vars
        run: |
          python3 - <<'EOF'
          import re, sys

          example = open("config/config.example.env").read()
          defined_keys = set(re.findall(r'^(STROMA_\w+)=', example, re.MULTILINE))

          # Vars referenced in systemd units must exist in the example config
          import pathlib
          referenced = set()
          for f in pathlib.Path("deploy/systemd").glob("*.service"):
              text = f.read_text()
              referenced |= set(re.findall(r'\$\{?(STROMA_\w+)\}?', text))
          for f in [pathlib.Path("src/vllm_watcher.py")]:
              text = f.read_text()
              referenced |= set(re.findall(r'"STROMA_\w+"', text))
              referenced = {k.strip('"') for k in referenced}

          missing = referenced - defined_keys - {
              # Known intentionally absent from example (set at install time)
              "STROMA_DRY_RUN", "STROMA_YES",
          }

          if missing:
              print(f"WARNING: vars referenced in code but not in config.example.env: {missing}")
              # Warn only — don't fail CI, some vars may be optional
          else:
              print("All referenced STROMA_* vars are documented in config.example.env")
          EOF
