# =============================================================================
# StromaAI — nginx TLS Reverse Proxy (Template)
# =============================================================================
# Terminates HTTPS and proxies to backend services:
#   - vLLM:     ${VLLM_INTERNAL_URL} (default: http://127.0.0.1:8000)
#   - Keycloak: ${KC_INTERNAL_URL} (default: http://127.0.0.1:8080)
#   - OpenWebUI: ${OPENWEBUI_INTERNAL_URL} (default: http://127.0.0.1:3000)
#
# This file is processed by envsubst during installation to support flexible
# service placement. Backend URLs are read from /opt/stroma-ai/config.env.
#
# Install:
#   # For manual install (after setting backend URLs in config.env):
#   export $(grep -E '^(VLLM|KC|OPENWEBUI|GATEWAY)_INTERNAL_URL=|^STROMA_TLS_(CERT|KEY)=' /opt/stroma-ai/config.env | xargs)
#   envsubst '${VLLM_INTERNAL_URL} ${KC_INTERNAL_URL} ${OPENWEBUI_INTERNAL_URL} ${GATEWAY_INTERNAL_URL} ${STROMA_TLS_CERT} ${STROMA_TLS_KEY}' \
#     < deploy/nginx/stroma-ai.conf \
#     > /etc/nginx/conf.d/stroma-ai.conf
#   nginx -t && systemctl reload nginx
#
# Or use the automated installer: ./install/install.sh --mode=head
#
# TLS certificate paths are set via envsubst from STROMA_TLS_CERT and
# STROMA_TLS_KEY in config.env. Defaults:
#   STROMA_TLS_CERT=/etc/pki/tls/certs/stroma.crt
#   STROMA_TLS_KEY=/etc/pki/tls/private/stroma.key
#
# For self-signed (air-gapped environments):
#   mkdir -p /etc/ssl/stroma-ai
#   openssl req -x509 -nodes -days 3650 -newkey rsa:4096 \
#     -keyout /etc/ssl/stroma-ai/server.key \
#     -out    /etc/ssl/stroma-ai/server.crt \
#     -subj "/CN=stroma-ai.your-cluster.example" \
#     -addext "subjectAltName=DNS:stroma-ai.your-cluster.example"
#   chmod 600 /etc/ssl/stroma-ai/server.key
#   chown root:root /etc/ssl/stroma-ai/server.*
#
# Security notes:
#   - /metrics endpoint is restricted to internal RFC-1918 ranges.
#     Edit the allow/deny blocks to match your site CIDR.
#   - /health is openly accessible for monitoring probes.
#   - The API is protected upstream by vLLM --api-key (Bearer token).
#     nginx adds no additional auth — the API key is the layer.
# =============================================================================

# ---------------------------------------------------------------------------
# Rate limiting — prevents queue flooding from misconfigured clients.
# stroma_ai_api: 30 req/min per IP with burst=20 to absorb momentary spikes.
# A legitimate interactive user submits far fewer than 30 req/min; this
# only fires against runaway clients. Adjust the rate for your user count.
# ---------------------------------------------------------------------------
limit_req_zone $binary_remote_addr zone=stroma_ai_api:10m rate=30r/m;

upstream vllm_backend {
    server ${VLLM_INTERNAL_URL};
    keepalive 32;
}

# OIDC gateway — validates JWT and forwards to vLLM with internal API key.
# External clients always hit this upstream; raw vLLM is never exposed.
upstream gateway_backend {
    server ${GATEWAY_INTERNAL_URL};
    keepalive 16;
}

upstream keycloak_backend {
    server ${KC_INTERNAL_URL};
    keepalive 16;
}

upstream openwebui_backend {
    server ${OPENWEBUI_INTERNAL_URL};
    keepalive 16;
}

# ---------------------------------------------------------------------------
# HTTP → HTTPS redirect
# ---------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name _;

    return 301 https://$host$request_uri;
}

# ---------------------------------------------------------------------------
# HTTPS endpoint
# ---------------------------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name _;

    # TLS configuration — paths substituted from STROMA_TLS_CERT / STROMA_TLS_KEY
    ssl_certificate     ${STROMA_TLS_CERT};
    ssl_certificate_key ${STROMA_TLS_KEY};
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ---------------------------------------------------------------------------
    # Proxy settings for long-running LLM requests
    # LLM completions can take 30–300s for large contexts; timeouts must
    # be generous enough to accommodate streaming responses.
    # ---------------------------------------------------------------------------
    proxy_read_timeout    300s;
    proxy_send_timeout    300s;
    proxy_connect_timeout 10s;

    # WebSocket + streaming support (server-sent events / chunked transfer)
    proxy_http_version    1.1;
    proxy_set_header      Upgrade           $http_upgrade;
    proxy_set_header      Connection        "upgrade";
    proxy_set_header      Host              $host;
    proxy_set_header      X-Real-IP         $remote_addr;
    proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header      X-Forwarded-Proto $scheme;

    # ---------------------------------------------------------------------------
    # Keycloak — OIDC identity provider
    # ---------------------------------------------------------------------------
    location /realms/ {
        proxy_pass http://keycloak_backend;
        
        # Keycloak requires proper forwarding headers so the issuer claim in
        # tokens matches the public URL. With KC_HOSTNAME_STRICT=true and
        # KC_HOSTNAME_URL set, KC ignores X-Forwarded-* and uses its own
        # configured URL. We still send them for redirect URI construction.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;
        
        # Keycloak admin console uses long-polling
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    location /admin/ {
        proxy_pass http://keycloak_backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    # Keycloak static assets — required for the admin console and login theme.
    location /resources/ {
        proxy_pass http://keycloak_backend;
    }

    location /js/ {
        proxy_pass http://keycloak_backend;
    }

    # ---------------------------------------------------------------------------
    # OpenWebUI — browser chat interface
    # ---------------------------------------------------------------------------
    # Legacy /webui/ path — redirect to root so bookmarks keep working.
    location /webui/ {
        return 301 /;
    }

    # ---------------------------------------------------------------------------
    # Main API — routed through the OIDC gateway.
    # gateway.py validates the Bearer JWT, checks the stroma_researcher role,
    # and substitutes the internal STROMA_API_KEY before forwarding to vLLM.
    # ---------------------------------------------------------------------------
    location /v1/ {
        limit_req zone=stroma_ai_api burst=20 nodelay;
        proxy_pass http://gateway_backend;
    }

    # Root catch-all — browser chat interface (OpenWebUI).
    # API clients always use /v1/ (see above); KC uses /realms/ and /admin/.
    location / {
        proxy_pass http://openwebui_backend;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support for OpenWebUI real-time features
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        proxy_buffering off;
        proxy_read_timeout 300s;
    }

    # ---------------------------------------------------------------------------
    # Prometheus metrics — restricted to internal network
    # Adjust the allow/deny blocks to match your site's internal CIDRs.
    # Prometheus server should be on the same internal network as this host.
    # ---------------------------------------------------------------------------
    location /metrics {
        proxy_pass http://vllm_backend;

        # Allow common RFC-1918 ranges; edit to match your site
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        allow 127.0.0.1;
        deny all;

        # No caching for live metrics
        proxy_cache off;
    }

    # ---------------------------------------------------------------------------
    # Health check — answered by nginx itself; no backend dependency.
    # Returns {"status":"ok"} regardless of backend state.
    # Separate /v1/models probe (TEST 2) verifies the actual backend.
    # ---------------------------------------------------------------------------
    location = /health {
        default_type application/json;
        return 200 '{"status":"ok","service":"stroma-ai"}';
        access_log off;
    }

    # ---------------------------------------------------------------------------
    # Security headers
    # ---------------------------------------------------------------------------
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Content-Type-Options    nosniff;
    add_header X-Frame-Options           DENY;
}
