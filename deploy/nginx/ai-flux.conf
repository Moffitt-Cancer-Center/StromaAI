# =============================================================================
# AI_Flux — nginx TLS Reverse Proxy
# =============================================================================
# Terminates HTTPS on port 443 and proxies to vLLM on localhost:8000.
#
# Install:
#   cp deploy/nginx/ai-flux.conf /etc/nginx/sites-available/ai-flux
#   ln -s /etc/nginx/sites-available/ai-flux /etc/nginx/sites-enabled/ai-flux
#   rm -f /etc/nginx/sites-enabled/default
#   nginx -t && systemctl reload nginx
#
# TLS certificate setup (self-signed for air-gapped environments):
#   mkdir -p /etc/ssl/ai-flux
#   openssl req -x509 -nodes -days 3650 -newkey rsa:4096 \
#     -keyout /etc/ssl/ai-flux/server.key \
#     -out    /etc/ssl/ai-flux/server.crt \
#     -subj "/CN=ai-flux.your-cluster.example" \
#     -addext "subjectAltName=DNS:ai-flux.your-cluster.example"
#   chmod 600 /etc/ssl/ai-flux/server.key
#   chown root:root /etc/ssl/ai-flux/server.*
#
# For internal CA:
#   Replace the ssl_certificate and ssl_certificate_key paths below with
#   the paths to your CA-signed certificate and key.
#
# Security notes:
#   - /metrics endpoint is restricted to internal RFC-1918 ranges.
#     Edit the allow/deny blocks to match your site CIDR.
#   - /health is openly accessible for monitoring probes.
#   - The API is protected upstream by vLLM --api-key (Bearer token).
#     nginx adds no additional auth — the API key is the layer.
# =============================================================================

upstream vllm_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

# ---------------------------------------------------------------------------
# HTTP → HTTPS redirect
# ---------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name _;

    return 301 https://$host$request_uri;
}

# ---------------------------------------------------------------------------
# HTTPS endpoint
# ---------------------------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name _;

    # TLS configuration
    ssl_certificate     /etc/ssl/ai-flux/server.crt;
    ssl_certificate_key /etc/ssl/ai-flux/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ---------------------------------------------------------------------------
    # Proxy settings for long-running LLM requests
    # LLM completions can take 30–300s for large contexts; timeouts must
    # be generous enough to accommodate streaming responses.
    # ---------------------------------------------------------------------------
    proxy_read_timeout    300s;
    proxy_send_timeout    300s;
    proxy_connect_timeout 10s;

    # WebSocket + streaming support (server-sent events / chunked transfer)
    proxy_http_version    1.1;
    proxy_set_header      Upgrade           $http_upgrade;
    proxy_set_header      Connection        "upgrade";
    proxy_set_header      Host              $host;
    proxy_set_header      X-Real-IP         $remote_addr;
    proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header      X-Forwarded-Proto $scheme;

    # Disable response buffering — required for streaming completions.
    # With buffering on, the client sees nothing until the full response
    # arrives; with buffering off, tokens stream in real time.
    proxy_buffering       off;

    # ---------------------------------------------------------------------------
    # Main API — proxied to vLLM
    # Authentication is handled by vLLM --api-key (Bearer token in headers).
    # ---------------------------------------------------------------------------
    location / {
        proxy_pass http://vllm_backend;
    }

    # ---------------------------------------------------------------------------
    # Prometheus metrics — restricted to internal network
    # Adjust the allow/deny blocks to match your site's internal CIDRs.
    # Prometheus server should be on the same internal network as this host.
    # ---------------------------------------------------------------------------
    location /metrics {
        proxy_pass http://vllm_backend;

        # Allow common RFC-1918 ranges; edit to match your site
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        allow 127.0.0.1;
        deny all;

        # No caching for live metrics
        proxy_cache off;
    }

    # ---------------------------------------------------------------------------
    # Health check — openly accessible for load balancer and monitoring probes
    # ---------------------------------------------------------------------------
    location /health {
        proxy_pass http://vllm_backend;
        access_log off;
    }

    # ---------------------------------------------------------------------------
    # Security headers
    # ---------------------------------------------------------------------------
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Content-Type-Options    nosniff;
    add_header X-Frame-Options           DENY;
}
