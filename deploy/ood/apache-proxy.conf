# =============================================================================
# StromaAI — Apache Reverse Proxy for Open OnDemand Server
# =============================================================================
#
# TWO DEPLOYMENT MODES — choose one:
#
# MODE A — ood_portal.yml injection (RECOMMENDED)
#   Injects StromaAI paths into OOD's existing port-443 VirtualHost.
#   No separate VirtualHost needed; port 8443 not required.
#   Paths exposed on the OOD FQDN:
#     GET  /health         → StromaAI gateway health check
#     *    /v1/            → StromaAI vLLM gateway (OpenAI-compatible API)
#     *    /realms/        → Keycloak OIDC (login, token, discovery)
#     *    /admin/         → Keycloak admin console
#     *    /resources/     → Keycloak static assets
#     *    /js/            → Keycloak JS adapter
#     *    /chat/          → OpenWebUI browser chat (WEBUI_BASE_URL=/chat required)
#
#   See the "custom_vhost_directives" snippet below for ood_portal.yml.
#
# MODE B — dedicated port-8443 VirtualHost (this file)
#   Creates a separate HTTPS VirtualHost on port 8443.
#   OpenWebUI lives at the root path /  (WEBUI_BASE_URL must be empty).
#   Port 8443 must be open in the firewall externally.
#   Only use this if mode A is not viable.
#
# ─────────────────────────────────────────────────────────────────────────────
# MODE A — ood_portal.yml snippet
# ─────────────────────────────────────────────────────────────────────────────
# Add to /etc/ood/config/ood_portal.yml under the custom_vhost_directives key,
# then run: sudo /opt/ood/ood-portal-generator/sbin/update_ood_portal
#           sudo systemctl reload httpd
#
# custom_vhost_directives:
#   - |
#     # StromaAI gateway health check
#     <Location /health>
#       ProxyPass        "http://10.14.193.97:9000/health"
#       ProxyPassReverse "http://10.14.193.97:9000/health"
#     </Location>
#   - |
#     # StromaAI vLLM gateway — OpenAI-compatible API
#     <Location /v1/>
#       ProxyPass        "http://10.14.193.97:9000/v1/"
#       ProxyPassReverse "http://10.14.193.97:9000/v1/"
#       SetEnv proxy-sendchunked 1
#       SetEnv proxy-initial-response-buffer-size 0
#       SetEnv proxy-interim-response-buffer-size 0
#     </Location>
#   - |
#     # Keycloak OIDC endpoints
#     <Location /realms/>
#       ProxyPass        "http://10.14.193.207:8080/realms/"
#       ProxyPassReverse "http://10.14.193.207:8080/realms/"
#       RequestHeader set X-Forwarded-Proto "https"
#       RequestHeader set X-Forwarded-Host  "ood-red.moffitt.org"
#       RequestHeader set X-Forwarded-Port  "443"
#     </Location>
#   - |
#     # Keycloak admin console
#     <Location /admin/>
#       ProxyPass        "http://10.14.193.207:8080/admin/"
#       ProxyPassReverse "http://10.14.193.207:8080/admin/"
#       RequestHeader set X-Forwarded-Proto "https"
#       RequestHeader set X-Forwarded-Host  "ood-red.moffitt.org"
#       RequestHeader set X-Forwarded-Port  "443"
#     </Location>
#   - |
#     # Keycloak static assets (login page CSS/JS/images)
#     <Location /resources/>
#       ProxyPass        "http://10.14.193.207:8080/resources/"
#       ProxyPassReverse "http://10.14.193.207:8080/resources/"
#     </Location>
#   - |
#     # Keycloak JS adapter
#     <Location /js/>
#       ProxyPass        "http://10.14.193.207:8080/js/"
#       ProxyPassReverse "http://10.14.193.207:8080/js/"
#     </Location>
#   - |
#     # OpenWebUI browser chat — WebSocket support for live token streaming
#     # Requires: WEBUI_BASE_URL=/chat set in OpenWebUI container env
#     RewriteCond %{HTTP:Upgrade} websocket [NC]
#     RewriteCond %{HTTP:Connection} upgrade  [NC]
#     RewriteRule ^/chat/(.*)$ "ws://10.14.193.207:3000/$1" [P,L]
#     <Location /chat/>
#       ProxyPass        "http://10.14.193.207:3000/"
#       ProxyPassReverse "http://10.14.193.207:3000/"
#     </Location>
#
# After applying, update the StromaAI head node (red-a70) config.env:
#   OIDC_DISCOVERY_URL=https://ood-red.moffitt.org/realms/stroma-ai/.well-known/openid-configuration
#   GATEWAY_VERIFY_SSL=false
#   sudo systemctl restart stroma-ai-gateway
#
# ─────────────────────────────────────────────────────────────────────────────
# MODE B — dedicated port-8443 VirtualHost (below)
# ─────────────────────────────────────────────────────────────────────────────
# Drop this file on the OOD server as:
#   /etc/httpd/conf.d/stroma-ai-proxy.conf
#
# Prerequisites (run on OOD server as root):
#   firewall-cmd --permanent --add-port=8443/tcp && firewall-cmd --reload
#   httpd -t && systemctl reload httpd
#
# Backend addresses (edit to match your environment):
#   KC_HOST     — Keycloak host:port   (default: 10.14.193.207:8080)
#   OWU_HOST    — OpenWebUI host:port  (default: 10.14.193.207:3000)
#   GW_HOST     — Gateway host:port   (default: 10.14.193.97:9000)
#
# NOTE: In mode B, OpenWebUI is served at / (root path) — WEBUI_BASE_URL must
# be left empty in the OpenWebUI container env.
# =============================================================================

# Tell Apache to also listen on 8443 if not already configured elsewhere.
# If another VirtualHost already has "Listen 8443", remove this line.
Listen 8443

# ---------------------------------------------------------------------------
# Backend addresses — edit these to match your environment
# ---------------------------------------------------------------------------
Define KC_HOST   10.14.193.207:8080
Define OWU_HOST  10.14.193.207:3000
Define GW_HOST   10.14.193.97:9000

<VirtualHost *:8443>
    ServerName ood-red.moffitt.org

    # -------------------------------------------------------------------------
    # TLS — reuse OOD's existing certificate
    # -------------------------------------------------------------------------
    SSLEngine on
    SSLCertificateFile    "/etc/pki/tls/certs/ood-red.crt"
    SSLCertificateKeyFile "/etc/pki/tls/private/ood-red.key"

    SSLProtocol           all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite        ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384
    SSLHonorCipherOrder   off
    SSLSessionTickets     off

    # -------------------------------------------------------------------------
    # Enable proxy modules for this vhost
    # -------------------------------------------------------------------------
    ProxyRequests Off
    ProxyPreserveHost On

    # Pass TLS termination info to all backends so they build correct URLs.
    # Keycloak reads X-Forwarded-Port via KC_PROXY_HEADERS=xforwarded, which
    # causes it to issue tokens with iss=https://ood-red.moffitt.org:8443/...
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Host  "ood-red.moffitt.org"
    RequestHeader set X-Forwarded-Port  "8443"

    # -------------------------------------------------------------------------
    # /health — answered directly, no backend required
    # -------------------------------------------------------------------------
    <Location /health>
        ProxyPass "http://${GW_HOST}/health"
        ProxyPassReverse "http://${GW_HOST}/health"
    </Location>

    # -------------------------------------------------------------------------
    # /realms/ — Keycloak OIDC endpoints (login, token, discovery)
    # -------------------------------------------------------------------------
    <Location /realms/>
        ProxyPass        "http://${KC_HOST}/realms/"
        ProxyPassReverse "http://${KC_HOST}/realms/"
    </Location>

    # -------------------------------------------------------------------------
    # /admin/ — Keycloak admin console
    # -------------------------------------------------------------------------
    <Location /admin/>
        ProxyPass        "http://${KC_HOST}/admin/"
        ProxyPassReverse "http://${KC_HOST}/admin/"
    </Location>

    # -------------------------------------------------------------------------
    # /resources/ — Keycloak static assets (login page CSS/JS/images)
    # -------------------------------------------------------------------------
    <Location /resources/>
        ProxyPass        "http://${KC_HOST}/resources/"
        ProxyPassReverse "http://${KC_HOST}/resources/"
    </Location>

    # -------------------------------------------------------------------------
    # /js/ — Keycloak JS adapter
    # -------------------------------------------------------------------------
    <Location /js/>
        ProxyPass        "http://${KC_HOST}/js/"
        ProxyPassReverse "http://${KC_HOST}/js/"
    </Location>

    # -------------------------------------------------------------------------
    # /v1/ — StromaAI vLLM gateway (OpenAI-compatible API)
    # -------------------------------------------------------------------------
    <Location /v1/>
        ProxyPass        "http://${GW_HOST}/v1/"
        ProxyPassReverse "http://${GW_HOST}/v1/"

        # SSE / chunked streaming — disable buffering so tokens stream live
        SetEnv proxy-sendchunked 1
        SetEnv proxy-initial-response-buffer-size 0
        SetEnv proxy-interim-response-buffer-size 0
    </Location>

    # -------------------------------------------------------------------------
    # / — OpenWebUI (catch-all, must be last)
    # WebSocket support required for live updates
    # -------------------------------------------------------------------------
    RewriteEngine On
    # WebSocket upgrade for OpenWebUI
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade  [NC]
    RewriteRule ^/(.*)$ "ws://${OWU_HOST}/$1" [P,L]

    ProxyPass        "/"  "http://${OWU_HOST}/"
    ProxyPassReverse "/"  "http://${OWU_HOST}/"

    # -------------------------------------------------------------------------
    # Logging
    # -------------------------------------------------------------------------
    ErrorLog  /var/log/httpd/stroma-ai-proxy-error.log
    CustomLog /var/log/httpd/stroma-ai-proxy-access.log combined

</VirtualHost>
