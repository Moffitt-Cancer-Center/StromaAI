# =============================================================================
# StromaAI — OOD Configuration File
# =============================================================================
# Sourced by /opt/ood/apps/code-server/template/script.sh.erb during
# every code-server session startup.
#
# This file is the ONLY place that needs to be updated when the vLLM
# endpoint host, port, API key, or model name changes. All OOD sessions
# pick up the new values automatically on next login.
#
# Permissions: chmod 640, chown root:stromaai (or root:www-data on some OOD setups)
# Location: /etc/ood/stroma-ai.conf
#
# Security: This file contains the internal API key. Restrict access to the
# OOD service user. The key is NOT a user credential — it is an internal
# shared secret between nginx/vLLM and the OOD session.
# =============================================================================

# Hostname of the Proxmox VM — must be DNS-resolvable from compute nodes
# where OOD code-server sessions run.
STROMA_HEAD_HOST=stroma-ai.your-cluster.example

# HTTPS port (nginx TLS proxy port, not raw vLLM port)
STROMA_HTTPS_PORT=443

# Internal API key — must match STROMA_API_KEY in /opt/stroma-ai/config.env
# exactly, or all requests from Kilo Code will return HTTP 401.
STROMA_API_KEY=CHANGEME_must_match_server_config

# Served model name — must match STROMA_MODEL_NAME in /opt/stroma-ai/config.env
STROMA_MODEL_NAME=stroma-ai-coder
