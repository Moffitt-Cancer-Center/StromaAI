# =============================================================================
# StromaAI — nginx Reverse Proxy (Container / Compose deployment)
# =============================================================================
# Container-specific variant of deploy/nginx/stroma-ai.conf.
#
# Key difference from the bare-metal conf:
#   All API traffic is routed through the OIDC Gateway service (gateway:9000)
#   instead of directly to vLLM.  This enforces JWT authentication for every
#   inference request even when clients connect directly to nginx:443.
#
#   The /health and /metrics paths bypass the gateway and hit vLLM directly
#   so monitoring scrapers work without a Bearer token.
#
# Upstream service names are Compose service names resolved via the internal
# stroma-head Docker network — do NOT change them without updating
# docker-compose.yml accordingly.
#
# TLS certificates are bind-mounted from the host at:
#   /etc/ssl/stroma-ai/server.crt
#   /etc/ssl/stroma-ai/server.key
# Generate self-signed certs with setup-head.sh --gen-certs, or supply
# your own CA-signed certificate pair.
# =============================================================================

# ---------------------------------------------------------------------------
# Rate limiting — 30 req/min per IP with burst headroom for short bursts.
# Tune the rate for your user count; increase for high-throughput sites.
# ---------------------------------------------------------------------------
limit_req_zone $binary_remote_addr zone=stroma_ai_api:10m rate=30r/m;

# ---------------------------------------------------------------------------
# Upstream: StromaAI OIDC Gateway (primary API path, auth-enforced)
# ---------------------------------------------------------------------------
upstream stroma_gateway {
    server gateway:9000;
    keepalive 32;
}

# ---------------------------------------------------------------------------
# Upstream: vLLM direct (health + metrics only — bypasses OIDC)
# ---------------------------------------------------------------------------
upstream vllm_direct {
    server vllm:8000;
    keepalive 8;
}

# ---------------------------------------------------------------------------
# HTTP → HTTPS redirect
# ---------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name _;

    return 301 https://$host$request_uri;
}

# ---------------------------------------------------------------------------
# HTTPS — main endpoint
# ---------------------------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name _;

    # TLS configuration
    ssl_certificate     /etc/ssl/stroma-ai/server.crt;
    ssl_certificate_key /etc/ssl/stroma-ai/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ---------------------------------------------------------------------------
    # Proxy defaults — generous timeouts for long-running LLM completions
    # ---------------------------------------------------------------------------
    proxy_read_timeout    300s;
    proxy_send_timeout    300s;
    proxy_connect_timeout 10s;

    # WebSocket + SSE / chunked streaming support
    proxy_http_version    1.1;
    proxy_set_header      Upgrade           $http_upgrade;
    proxy_set_header      Connection        "upgrade";
    proxy_set_header      Host              $host;
    proxy_set_header      X-Real-IP         $remote_addr;
    proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header      X-Forwarded-Proto $scheme;

    # Disable response buffering so tokens stream to the client in real time
    proxy_buffering       off;

    # ---------------------------------------------------------------------------
    # /v1/* — OIDC-authenticated API (routed through gateway)
    # The gateway validates the Bearer JWT and substitutes the internal API key
    # before forwarding to vLLM. All inference endpoints live under /v1/.
    # ---------------------------------------------------------------------------
    location /v1/ {
        limit_req zone=stroma_ai_api burst=20 nodelay;
        proxy_pass http://stroma_gateway;
    }

    # ---------------------------------------------------------------------------
    # / (root) — catch-all, also routed through gateway
    # Keeps legacy clients that hit / directly auth-protected.
    # ---------------------------------------------------------------------------
    location / {
        limit_req zone=stroma_ai_api burst=20 nodelay;
        proxy_pass http://stroma_gateway;
    }

    # ---------------------------------------------------------------------------
    # /health — unauthenticated; routed directly to vLLM for liveness probes
    # ---------------------------------------------------------------------------
    location /health {
        proxy_pass http://vllm_direct;
        access_log off;
    }

    # ---------------------------------------------------------------------------
    # /metrics — Prometheus scrape endpoint; network-restricted
    # Adjust allow/deny to match your Prometheus server's CIDR.
    # ---------------------------------------------------------------------------
    location /metrics {
        proxy_pass http://vllm_direct;

        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        allow 127.0.0.1;
        deny all;

        proxy_cache off;
    }

    # ---------------------------------------------------------------------------
    # Security headers
    # ---------------------------------------------------------------------------
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Content-Type-Options    nosniff;
    add_header X-Frame-Options           DENY;
}
