# =============================================================================
# StromaAI — Keycloak 26.x Identity Provider
# =============================================================================
# Provides OIDC/OAuth 2.0 authentication for the StromaAI platform.
# Uses PostgreSQL as the backing store for production durability.
#
# Usage:
#   cp ../../config/config.example.env .env  # then fill in secrets
#   podman compose up -d
#
# The stroma-ai realm is imported automatically on first start from:
#   ./realm-export.json
#
# Admin console: http://<KC_HOSTNAME>:<KC_PORT>/admin
# OIDC discovery: http://<KC_HOSTNAME>:<KC_PORT>/realms/stroma-ai/.well-known/openid-configuration
# =============================================================================

services:
  postgres:
    image: postgres:16-alpine
    hostname: postgres
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KC_DB_PASSWORD:-}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    # No host-facing ports — only reachable by keycloak service on this network
    networks:
      - keycloak-net

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: >
      start-dev
      --import-realm
      --features=token-exchange,admin-fine-grained-authz
      --health-enabled=true
    environment:
      # Database
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KC_DB_PASSWORD:-}

      # Admin bootstrap (only used on first start — Keycloak 26+)
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_ADMIN_USER:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD:-}

      # Hostname / TLS
      # In production, set KC_HOSTNAME to your FQDN and place a TLS-terminating
      # reverse proxy (nginx/traefik) in front. Use start (not start-dev) for prod.
      KC_HOSTNAME: ${KC_HOSTNAME:-localhost}
      KC_HTTP_PORT: "8080"
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"

      # Logging
      KC_LOG_LEVEL: INFO
    volumes:
      - ./realm-export.json:/opt/keycloak/data/import/stroma-ai-realm.json:ro
    ports:
      - "${KC_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      # Use bash built-in /dev/tcp — no curl/wget dependency in the ubi9 image.
      # Opens a TCP connection to port 8080 and checks it accepts connections.
      # Keycloak only accepts connections after startup and realm import complete.
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/8080' 2>/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2'
    networks:
      - keycloak-net

volumes:
  postgres_data:

networks:
  # Single shared network for keycloak ↔ postgres.
  # RHEL 8 CNI: attaching a container to multiple networks causes DNS resolution
  # failures for hostnames on secondary networks.  One network avoids this.
  # Postgres is still unexposed: it has no published ports.
  keycloak-net:
