# =============================================================================
# StromaAI — Prometheus Scrape Configuration
# =============================================================================
# Add the contents of this file to your existing prometheus.yml, or use it
# as a standalone config if deploying Prometheus for StromaAI only.
#
# Install with alerting rules:
#   cp monitoring/prometheus.yml /etc/prometheus/conf.d/stroma-ai.yml
#   cp monitoring/alerts/stroma-ai.yml /etc/prometheus/rules/stroma-ai.yml
#   systemctl reload prometheus
#
# Metrics exposed by vLLM at /metrics (Prometheus format):
#   vllm:num_requests_waiting     — queued requests with no GPU slot
#   vllm:num_requests_running     — requests actively being processed
#   vllm:gpu_cache_usage_perc     — GPU VRAM KV cache occupancy (0.0–1.0)
#   vllm:cpu_cache_usage_perc     — CPU RAM KV cache occupancy (0.0–1.0)
#   vllm:num_requests_swapped     — requests evicted from GPU to CPU cache
#   vllm:e2e_request_latency_seconds — end-to-end latency histogram
#   vllm:time_to_first_token_seconds — TTFT latency histogram
# =============================================================================

global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    cluster: "your-cluster-name"   # edit to your site identifier
    service: "stroma-ai"

# ---------------------------------------------------------------------------
# Rule files — alert thresholds defined below
# ---------------------------------------------------------------------------
rule_files:
  - "/etc/prometheus/rules/stroma-ai.yml"

# ---------------------------------------------------------------------------
# Scrape configuration
# ---------------------------------------------------------------------------
scrape_configs:

  # vLLM metrics — scraped via nginx HTTPS proxy
  # /metrics is restricted to internal CIDRs in nginx config;
  # Prometheus must run on the same host or within the allowed CIDR.
  - job_name: "stroma-ai-vllm"
    scheme: https
    metrics_path: /metrics
    tls_config:
      # For self-signed certs. Remove once using a CA-signed certificate.
      insecure_skip_verify: true
    # If STROMA_API_KEY is required for /metrics:
    # authorization:
    #   type: Bearer
    #   credentials: "your-api-key"
    static_configs:
      - targets:
          - "stroma-ai.your-cluster.example:443"
        labels:
          instance: "stroma-ai-head"

  # Ray cluster metrics (if Ray Prom exporter is enabled)
  # ray start --head --metrics-export-port=8080
  # - job_name: "stroma-ai-ray"
  #   static_configs:
  #     - targets: ["stroma-ai.your-cluster.example:8080"]

