# =============================================================================
# StromaAI — nginx Dev/POC Reverse Proxy
# =============================================================================
# Dev variant of deploy/head/nginx.conf. Key differences:
#
#   1. vllm_direct upstream uses host.containers.internal (vLLM runs with
#      network_mode: host in the inference profile, not on the bridge).
#   2. More permissive rate limits for single-developer use.
#   3. Compatible with self-signed TLS certs generated by dev.sh.
#
# This file is bind-mounted into the nginx container by dev/docker-compose.yml.
# Do not use in production — use deploy/head/nginx.conf instead.
# =============================================================================

# ---------------------------------------------------------------------------
# Rate limiting — relaxed for dev (100 req/min vs 30 req/min in prod)
# ---------------------------------------------------------------------------
limit_req_zone $binary_remote_addr zone=stroma_ai_api:10m rate=100r/m;

# ---------------------------------------------------------------------------
# Upstream: StromaAI OIDC Gateway (bridge network — service name resolves)
# ---------------------------------------------------------------------------
upstream stroma_gateway {
    server gateway:9000;
    keepalive 32;
}

# ---------------------------------------------------------------------------
# Upstream: vLLM direct (health + metrics only)
# ---------------------------------------------------------------------------
# vLLM runs with network_mode:host (inference profile).
# host.containers.internal resolves to the Podman host gateway IP and is
# automatically injected into every container's /etc/hosts by Podman.
# Port 8000 is the default STROMA_VLLM_PORT — change here if you customise it.
# ---------------------------------------------------------------------------
upstream vllm_direct {
    server host.containers.internal:8000;
    keepalive 8;
}

# ---------------------------------------------------------------------------
# HTTP → HTTPS redirect
# ---------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Dev: pass /health through on HTTP for simple liveness checks
    location /health {
        proxy_pass http://vllm_direct;
        access_log off;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------------------------------
# HTTPS — main endpoint (self-signed cert generated by dev.sh --gen-certs)
# ---------------------------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name _;

    ssl_certificate     /etc/ssl/stroma-ai/server.crt;
    ssl_certificate_key /etc/ssl/stroma-ai/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:1m;
    ssl_session_timeout 1d;

    # -------------------------------------------------------------------------
    # Proxy defaults — long timeouts for streaming LLM responses
    # -------------------------------------------------------------------------
    proxy_read_timeout    300s;
    proxy_send_timeout    300s;
    proxy_connect_timeout 10s;

    # WebSocket + SSE / chunked streaming support
    proxy_http_version    1.1;
    proxy_set_header      Upgrade           $http_upgrade;
    proxy_set_header      Connection        "upgrade";
    proxy_set_header      Host              $host;
    proxy_set_header      X-Real-IP         $remote_addr;
    proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header      X-Forwarded-Proto $scheme;

    # Disable response buffering so tokens stream in real time
    proxy_buffering       off;

    # -------------------------------------------------------------------------
    # /v1/* — OIDC-gated inference API
    # -------------------------------------------------------------------------
    location /v1/ {
        limit_req zone=stroma_ai_api burst=50 nodelay;
        proxy_pass http://stroma_gateway;
    }

    # -------------------------------------------------------------------------
    # / (catch-all) — routed through gateway (covers OpenAI-compat root paths)
    # -------------------------------------------------------------------------
    location / {
        limit_req zone=stroma_ai_api burst=50 nodelay;
        proxy_pass http://stroma_gateway;
    }

    # -------------------------------------------------------------------------
    # /health — unauthenticated liveness probe (vLLM direct)
    # Returns 502 gracefully when the inference profile is not running.
    # -------------------------------------------------------------------------
    location /health {
        proxy_pass http://vllm_direct;
        access_log off;
        # Don't fail the nginx health check if vLLM is not running
        proxy_connect_timeout 2s;
        proxy_read_timeout    2s;
    }

    # -------------------------------------------------------------------------
    # /metrics — Prometheus scrape (vLLM direct, unrestricted in dev)
    # -------------------------------------------------------------------------
    location /metrics {
        proxy_pass http://vllm_direct;
        proxy_cache off;
        proxy_connect_timeout 2s;
        proxy_read_timeout    5s;
    }
}
