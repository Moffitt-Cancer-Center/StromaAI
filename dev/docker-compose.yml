# =============================================================================
# StromaAI — Dev / POC / Demo Compose (all containers, single host)
# =============================================================================
# Runs the full StromaAI stack on a single machine for development, demos,
# and integration testing.  Managed by dev/dev.sh — do not start directly
# with podman-compose unless you have already run dev.sh to generate dev/.env.
#
# Service layout:
#   stroma-dev bridge network (container ↔ container DNS):
#     postgres      — Keycloak backing store
#     keycloak      — OIDC/OAuth2 identity provider
#     gateway       — FastAPI OIDC proxy (validates JWTs, forwards to vLLM)
#     nginx         — TLS reverse proxy (self-signed cert, generated by dev.sh)
#     openwebui     — Browser chat UI
#
#   host network (required by Ray/Slurm cross-node communication):
#     ray-head      — Ray GCS coordinator          [profile: inference]
#     vllm          — vLLM inference API server    [profile: inference]
#     watcher       — Slurm burst scaler           [profile: watcher]
#
# Profiles:
#   (none)      — auth + UI + gateway only (no inference; fast cold start)
#   inference   — adds ray-head + vllm (requires model weights + CUDA GPU)
#   watcher     — adds the Slurm burst scaler (requires sbatch/squeue on host)
#
# Quick start:
#   cd dev && ./dev.sh up                  # auth/UI stack only
#   cd dev && ./dev.sh up --inference      # include vLLM
#   cd dev && ./dev.sh logs
#   cd dev && ./dev.sh down
#
# Environment: generated by dev.sh into dev/.env (never commit that file).
# =============================================================================

services:

  # ===========================================================================
  # postgres — Keycloak relational backing store
  # ===========================================================================
  postgres:
    image: ${IMAGE_POSTGRES:-postgres:16-alpine}
    container_name: dev-stroma-postgres
    hostname: postgres
    environment:
      POSTGRES_DB:       keycloak
      POSTGRES_USER:     keycloak
      POSTGRES_PASSWORD: ${KC_DB_PASSWORD:?KC_DB_PASSWORD not set — run dev.sh}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped
    # Publish on all interfaces so keycloak can reach it via
    # host.containers.internal (slirp4netns gateway) without CNI dnsname.
    ports:
      - "5432:5432"
    networks:
      stroma-dev:
        aliases:
          - postgres

  # ===========================================================================
  # keycloak — Identity provider (dev mode: start-dev, no TLS termination)
  # ===========================================================================
  # KC_HOSTNAME is set to the host's primary IP by dev.sh so that:
  #   - The browser can reach the OIDC authorization endpoint
  #   - JWT issuer claims match the externally-visible URL
  # Keycloak is published on KC_PORT (default 8080) on all interfaces.
  # ===========================================================================
  keycloak:
    image: ${IMAGE_KEYCLOAK:-quay.io/keycloak/keycloak:26.0}
    container_name: dev-stroma-keycloak
    command: >
      start-dev
      --features=token-exchange,admin-fine-grained-authz
      --health-enabled=true
    environment:
      KC_DB:                       postgres
      # Use host.containers.internal (slirp4netns gateway) instead of the
      # CNI bridge hostname 'postgres' — CNI dnsname requires podman-plugins
      # which non-root users on RHEL 8 cannot install.
      KC_DB_URL:                   jdbc:postgresql://host.containers.internal:5432/keycloak
      KC_DB_USERNAME:              keycloak
      KC_DB_PASSWORD:              ${KC_DB_PASSWORD:?}

      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_ADMIN_USER:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD:?KC_ADMIN_PASSWORD not set — run dev.sh}

      # DEV_HOST_IP set by dev.sh to the host's primary interface IP.
      # This controls the issuer URL embedded in JWT tokens — must be
      # reachable from both the browser and from other containers.
      KC_HOSTNAME:                 ${DEV_HOST_IP:?run dev.sh to set DEV_HOST_IP}
      KC_HTTP_PORT:                "8080"
      KC_HOSTNAME_STRICT:          "false"
      KC_HTTP_ENABLED:             "true"
      KC_LOG_LEVEL:                INFO
    ports:
      - "${KC_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/8080' 2>/dev/null"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 90s
    # host.containers.internal routes to the host loopback via slirp4netns,
    # where postgres publishes 5432:5432.
    extra_hosts:
      - "host.containers.internal:host-gateway"
    networks:
      - stroma-dev

  # ===========================================================================
  # gateway — FastAPI OIDC security proxy
  # ===========================================================================
  # Validates Keycloak JWTs and forwards authenticated requests to vLLM.
  # In dev, vLLM runs on the host network (network_mode: host), so the gateway
  # reaches it via host.containers.internal (the Podman host gateway IP).
  # ===========================================================================
  gateway:
    build:
      context: ..
      dockerfile: deploy/head/Dockerfile.gateway
    image: ${IMAGE_GATEWAY:-stroma-ai-gateway:dev}
    container_name: dev-stroma-gateway
    environment:
      # Use host.containers.internal so gateway can reach Keycloak even
      # when CNI dnsname is unavailable (rootless RHEL 8, no podman-plugins).
      # Keycloak is published on KC_PORT on all interfaces.
      OIDC_DISCOVERY_URL:   "http://host.containers.internal:${KC_PORT:-8080}/realms/stroma-ai/.well-known/openid-configuration"
      OIDC_AUDIENCE:        ${OIDC_AUDIENCE:-stroma-gateway}
      # vLLM is on the host network — reach via host.containers.internal
      VLLM_BACKEND_URL:     "http://host.containers.internal:${STROMA_VLLM_PORT:-8000}"
      STROMA_API_KEY:       ${STROMA_API_KEY:?STROMA_API_KEY not set — run dev.sh}
      GATEWAY_PORT:         ${GATEWAY_PORT:-9000}
      GATEWAY_LOG_LEVEL:    ${GATEWAY_LOG_LEVEL:-debug}
      GATEWAY_ALLOWED_ROLE: ${GATEWAY_ALLOWED_ROLE:-stroma_researcher}
      JWKS_REFRESH_SECS:    ${JWKS_REFRESH_SECS:-3600}
    depends_on:
      keycloak:
        condition: service_healthy
    restart: unless-stopped
    # host.containers.internal lets gateway reach vLLM on host network
    extra_hosts:
      - "host.containers.internal:host-gateway"
    networks:
      - stroma-dev
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:${GATEWAY_PORT:-9000}/health"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ===========================================================================
  # nginx — TLS reverse proxy (self-signed cert auto-generated by dev.sh)
  # ===========================================================================
  # Routes /v1/* and / through the OIDC gateway.
  # /health and /metrics bypass the gateway (unauthenticated monitoring).
  # vLLM (host network) is reached via host.containers.internal.
  # ===========================================================================
  nginx:
    image: ${IMAGE_NGINX:-nginx:1.27-alpine}
    container_name: dev-stroma-nginx
    ports:
      - "80:80"
      - "${STROMA_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx-dev.conf:/etc/nginx/conf.d/stroma-ai.conf:ro
      - ./dev-data/certs:/etc/ssl/stroma-ai:ro
    depends_on:
      gateway:
        condition: service_healthy
    restart: unless-stopped
    # Resolve host.containers.internal for the vllm_direct upstream in nginx-dev.conf
    extra_hosts:
      - "host.containers.internal:host-gateway"
    networks:
      - stroma-dev
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health 2>&1 || true; exit 0"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ===========================================================================
  # openwebui — Browser chat UI
  # ===========================================================================
  # Authenticates users via Keycloak OIDC and routes inference requests through
  # the gateway.  In dev, both openwebui and gateway are on the stroma-dev
  # bridge so inter-service calls use the gateway service name directly.
  # ===========================================================================
  openwebui:
    image: ${IMAGE_OPENWEBUI:-ghcr.io/open-webui/open-webui:v0.5.20}
    container_name: dev-stroma-openwebui
    ports:
      - "${OPENWEBUI_PORT:-3000}:8080"
    environment:
      # Gateway is on the same bridge network — use the service name directly
      OPENAI_API_BASE_URL:    "http://gateway:${GATEWAY_PORT:-9000}/v1"
      OPENAI_API_KEY:         "${STROMA_GATEWAY_API_KEY:-not-used-gateway-validates-oidc}"
      OAUTH_PROVIDER_NAME:    "${OAUTH_PROVIDER_NAME:-StromaAI Identity}"
      # Must use DEV_HOST_IP: browser needs to reach Keycloak for OIDC redirects,
      # and OpenWebUI backend validates tokens against this issuer URL.
      OPENID_PROVIDER_URL:    "http://${DEV_HOST_IP}:${KC_PORT:-8080}/realms/stroma-ai"
      OAUTH_CLIENT_ID:        "${KC_OPENWEBUI_CLIENT_ID:-}"
      OAUTH_CLIENT_SECRET:    "${KC_OPENWEBUI_CLIENT_SECRET:-}"
      OAUTH_SCOPES:           "openid profile email"
      ENABLE_OAUTH_SIGNUP:    "${ENABLE_OAUTH_SIGNUP:-true}"
      WEBUI_AUTH:             "true"
      DEFAULT_USER_ROLE:      "user"
      WEBUI_NAME:             "${WEBUI_NAME:-StromaAI Dev}"
      WEBUI_SECRET_KEY:       "${WEBUI_SECRET_KEY:?run dev.sh}"
      SCARF_NO_ANALYTICS:     "true"
      DO_NOT_TRACK:           "true"
      ANONYMIZED_TELEMETRY:   "false"
    volumes:
      - openwebui_data:/app/backend/data
    depends_on:
      keycloak:
        condition: service_healthy
      gateway:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - stroma-dev
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ===========================================================================
  # ray-head — Ray GCS coordinator                          [profile: inference]
  # ===========================================================================
  # network_mode: host required so Slurm GPU workers can connect back.
  # In a single-machine dev setup workers are launched manually or not at all.
  # ===========================================================================
  ray-head:
    image: ${IMAGE_RAY:-rayproject/ray:2.40.0-py311}
    container_name: dev-stroma-ray-head
    profiles:
      - inference
    command: >
      ray start
        --head
        --port=${STROMA_RAY_PORT:-6380}
        --dashboard-port=${STROMA_RAY_DASHBOARD_PORT:-8265}
        --dashboard-host=0.0.0.0
        --num-cpus=0
        --num-gpus=0
        --block
    network_mode: host
    volumes:
      - ray_tmp:/tmp/ray
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ray status 2>/dev/null || exit 1"]
      interval: 20s
      timeout: 15s
      retries: 5
      start_period: 30s

  # ===========================================================================
  # vllm — vLLM inference API server                        [profile: inference]
  # ===========================================================================
  # Requires real model weights at DEV_MODEL_PATH (symlink or rsync your
  # weights into dev/dev-data/models/ or override DEV_MODEL_PATH in dev/.env).
  # Runs in Ray distributed mode; GPU is optional on a dev machine — useful
  # for testing the API surface with a small CPU-runnable model.
  # ===========================================================================
  vllm:
    image: ${IMAGE_VLLM:-vllm/vllm-openai:v0.7.2}
    container_name: dev-stroma-vllm
    profiles:
      - inference
    command: >
      vllm serve ${DEV_MODEL_PATH:-/dev-data/models}
        --served-model-name ${STROMA_MODEL_NAME:-stroma-ai-coder}
        --quantization ${STROMA_VLLM_QUANTIZATION:-awq}
        --tensor-parallel-size 1
        --distributed-executor-backend ray
        --disable-async-output-proc
        --host 0.0.0.0
        --port ${STROMA_VLLM_PORT:-8000}
        --api-key ${STROMA_API_KEY:-}
        --trust-remote-code
    environment:
      RAY_ADDRESS:               "localhost:${STROMA_RAY_PORT:-6380}"
      HF_HUB_OFFLINE:            "1"
      TRANSFORMERS_OFFLINE:      "1"
      VLLM_HOST_IP:              "127.0.0.1"
      GLOO_SOCKET_IFNAME:        lo
      NCCL_SOCKET_IFNAME:        lo
    volumes:
      - ${DEV_MODEL_PATH:-./dev-data/models}:${DEV_MODEL_PATH:-/dev-data/models}:ro
    network_mode: host
    depends_on:
      ray-head:
        condition: service_healthy
    # Retry limit: vllm exits immediately if model weights are missing or no
    # GPU is available.  Without a cap, on-failure restarts indefinitely and
    # fills logs.  After 3 failures the container stays stopped; re-run
    # 'dev.sh up --inference' once the model path is populated.
    restart: "no"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:${STROMA_VLLM_PORT:-8000}/health || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 300s

  # ===========================================================================
  # watcher — Dynamic Slurm burst scaler                     [profile: watcher]
  # ===========================================================================
  # Requires Slurm CLI binaries (sbatch, squeue, etc.) on the host.
  # Use dev.sh up --watcher only if Slurm is installed on this machine.
  # ===========================================================================
  watcher:
    build:
      context: ..
      dockerfile: deploy/head/Dockerfile.watcher
    image: ${IMAGE_WATCHER:-stroma-ai-watcher:dev}
    container_name: dev-stroma-watcher
    profiles:
      - watcher
    environment:
      STROMA_HEAD_HOST:              localhost
      STROMA_RAY_HOST:               localhost
      STROMA_RAY_PORT:               ${STROMA_RAY_PORT:-6380}
      STROMA_VLLM_PORT:              ${STROMA_VLLM_PORT:-8000}
      STROMA_API_KEY:                ${STROMA_API_KEY:-}
      STROMA_MAX_BURST_WORKERS:      ${STROMA_MAX_BURST_WORKERS:-2}
      STROMA_SCALE_UP_THRESHOLD:     ${STROMA_SCALE_UP_THRESHOLD:-1}
      STROMA_SCALE_DOWN_IDLE_SECONDS: ${STROMA_SCALE_DOWN_IDLE_SECONDS:-120}
      STROMA_SCALE_UP_COOLDOWN:      ${STROMA_SCALE_UP_COOLDOWN:-60}
      STROMA_WATCHER_POLL_INTERVAL:  ${STROMA_WATCHER_POLL_INTERVAL:-15}
      STROMA_SLURM_PARTITION:        ${STROMA_SLURM_PARTITION:-gpu}
      STROMA_SLURM_ACCOUNT:          ${STROMA_SLURM_ACCOUNT:-stroma-ai-dev}
      STROMA_SLURM_SCRIPT:           ${DEV_SHARED_ROOT:-./dev-data/shared}/slurm/stroma_ai_worker.slurm
      STROMA_SHARED_ROOT:            ${DEV_SHARED_ROOT:-/dev-data/shared}
      STROMA_STATE_FILE:             /var/lib/stroma-ai/watcher_state.json
      STROMA_LOG_DIR:                ${DEV_SHARED_ROOT:-./dev-data/shared}/logs
    volumes:
      - watcher_state:/var/lib/stroma-ai
      - ${SLURM_SBATCH_BIN:-/usr/bin/sbatch}:/usr/bin/sbatch:ro
      - ${SLURM_SQUEUE_BIN:-/usr/bin/squeue}:/usr/bin/squeue:ro
      - ${SLURM_SCANCEL_BIN:-/usr/bin/scancel}:/usr/bin/scancel:ro
      - ${SLURM_SINFO_BIN:-/usr/bin/sinfo}:/usr/bin/sinfo:ro
      - ${SLURM_CONF_PATH:-/etc/slurm}:/etc/slurm:ro
      - ${SLURM_MUNGE_SOCKET_DIR:-/var/run/munge}:/var/run/munge:ro
      - ${DEV_SHARED_ROOT:-./dev-data/shared}:${DEV_SHARED_ROOT:-/dev-data/shared}
    network_mode: host
    depends_on:
      vllm:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import os,time,sys; s=os.stat('/var/lib/stroma-ai/watcher_heartbeat'); sys.exit(0 if time.time()-s.st_mtime<120 else 1)"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 60s

# =============================================================================
# Named volumes
# =============================================================================
volumes:
  postgres_data:
    driver: local
  openwebui_data:
    driver: local
  ray_tmp:
    driver: local
  watcher_state:
    driver: local

# =============================================================================
# Networks
# =============================================================================
# Single bridge network for all containerised services.
# Ray, vLLM, and watcher use network_mode: host (not this network).
networks:
  stroma-dev:
    driver: bridge
    name: stroma-dev
